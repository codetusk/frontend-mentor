<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article>
      <img src="./images/illustration-article.svg" alt="" />
      <ul class="bold-text small-text">
        <li>Learning</li>
      </ul>
      <p class="published-date small-text">
        Published <time datetime="2023-12-21">21 Dec 2023</time>
      </p>
      <h3 class="course-name bold-text">HTML & CSS foundations</h3>
      <p class="description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <footer>
        <img
          class="avatar"
          src="images/image-avatar.webp"
          alt="Avatar of the author"
        />
        <!-- <address> can be used in a variety of contexts, such as -->
        <!-- providing a business's contact information in the page header, or indicating -->
        <!-- the author of an article by including an <address> element within the <article>. -->
        <!-- From MDN reference https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/address -->

        <address class="bold-text small-text">Greg Hooper</address>
      </footer>
    </article>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/codetusk">Tusk</a>.
    </footer>
  </body>
</html>
